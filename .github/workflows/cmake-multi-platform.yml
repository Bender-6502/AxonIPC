name: CMake-Multi-Platform-Build

env:
  project: AxonIPC
  versionstr: 1.0.0.${{ github.run_number }}

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true

      matrix:
        os: [ubuntu-latest]
        build_type: [Debug, Release]
        c_compiler: [gcc, clang]
        include:
          - os: ubuntu-latest
            c_compiler: gcc
            cpp_compiler: g++
            artifact: GNU-Linux
          - os: ubuntu-latest
            c_compiler: clang
            cpp_compiler: clang++
            artifact: Clang-Linux

    steps:

      - name: Checkout submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive

      - name: Set reusable strings
        id: strings
        shell: bash
        run: |
          echo "build-output-dir=${{ github.workspace }}/build" >> "$GITHUB_OUTPUT"

      - name: Configure CMake
        run: >
          cmake -B ${{ steps.strings.outputs.build-output-dir }}
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -S ${{ github.workspace }}

      - name: Build
        run: cmake --build ${{ steps.strings.outputs.build-output-dir }} --config ${{ matrix.build_type }}

      - name: Test on Linux
        if: runner.os == 'Linux'
        working-directory: ${{ steps.strings.outputs.build-output-dir }}/${{ env.project }}Tests
        run:   |
          ./${{ env.project }}Tests

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.project }}-${{ matrix.build_type }}-${{ matrix.artifact }}-${{ env.versionstr }}
          path: ${{ steps.strings.outputs.build-output-dir }}
